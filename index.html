<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Printer Scanner">
<title>🖨️ Printer Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --amber: #EF9F27;
    --amber-dark: #BA7517;
    --amber-light: #FAEEDA;
    --amber-border: #FAC775;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --green: #25D366;
    --red-bg: #FCEBEB;
    --red-border: #F7C1C1;
    --red-text: #A32D2D;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-icon { font-size: 22px; }
  .topbar-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .topbar-right { margin-left: auto; }
  .key-status {
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px; border: none; cursor: pointer;
  }
  .key-saved   { background: #e6f9ee; color: #1a7a40; }
  .key-missing { background: var(--red-bg); color: var(--red-text); }

  .progress-wrap { padding: 14px 20px 6px; }
  .progress-steps { display: flex; gap: 5px; margin-bottom: 6px; }
  .ps { flex: 1; height: 4px; border-radius: 2px; background: #ddd; transition: background 0.3s; }
  .ps.done   { background: var(--amber-dark); }
  .ps.active { background: var(--amber); }
  .progress-label { font-size: 12px; color: var(--text-muted); }

  .content { padding: 16px 20px; }

  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 18px;
    margin-bottom: 14px;
  }
  .card-label {
    font-size: 11px; font-weight: 700; color: var(--amber-dark);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px;
  }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 16px; border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer; border: none;
    margin-bottom: 10px; transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary   { background: var(--amber); color: #412402; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-email     { background: #1a73e8; color: #fff; font-size: 17px; padding: 18px; }
  .btn-back {
    background: none; border: none; color: var(--amber-dark);
    font-size: 14px; cursor: pointer; padding: 8px 0;
    display: flex; align-items: center; gap: 4px; margin-bottom: 14px;
  }

  .field-label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; display: block; }
  input[type="password"], input[type="text"] {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 1.5px solid var(--border); background: #f9f8f5;
    color: var(--text); font-size: 15px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(239,159,39,0.18); }
  input[type="file"] { display: none; }

  .key-banner {
    background: #e6f9ee; border: 1px solid #9fe3be; border-radius: 12px;
    padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .key-banner-icon { font-size: 20px; }
  .key-banner-text { flex: 1; font-size: 13px; color: #1a5c33; line-height: 1.4; }
  .key-banner-change { font-size: 12px; color: var(--amber-dark); background: none; border: none; cursor: pointer; text-decoration: underline; flex-shrink: 0; }

  .info-box { background: #e8f0fe; border: 1px solid #b6cef7; border-radius: 12px; padding: 12px 14px; font-size: 13px; color: #1a3c8f; line-height: 1.5; margin-bottom: 14px; }
  .tip-box  { background: var(--amber-light); border: 1px solid var(--amber-border); border-radius: 12px; padding: 12px 14px; font-size: 13px; color: #633806; line-height: 1.5; margin-bottom: 14px; }

  /* Photo section */
  .photo-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .photo-option-btn {
    padding: 18px 10px; border-radius: 14px;
    border: 2px dashed var(--border); background: #f9f8f5;
    cursor: pointer; text-align: center;
    transition: border-color 0.2s, background 0.2s;
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .photo-option-btn:active { background: var(--amber-light); border-color: var(--amber); }
  .photo-option-icon { font-size: 28px; display: block; margin-bottom: 6px; }

  .photo-preview-wrap { position: relative; border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
  .photo-preview-wrap img { width: 100%; display: block; max-height: 240px; object-fit: cover; border-radius: 14px; border: 2px solid var(--amber); }
  .photo-preview-label {
    position: absolute; top: 8px; left: 8px;
    background: var(--amber); color: #412402;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em;
  }
  .retake-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .retake-btn {
    flex: 1; padding: 10px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text);
  }

  .saved-photo-row {
    background: var(--amber-light); border: 1px solid var(--amber-border);
    border-radius: 12px; padding: 10px 14px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .saved-thumb { width: 60px; height: 50px; object-fit: cover; border-radius: 8px; }
  .saved-info { flex: 1; }
  .saved-title { font-size: 13px; font-weight: 600; color: var(--amber-dark); }
  .saved-retake { font-size: 12px; color: var(--amber-dark); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; margin-top: 2px; display: block; }

  .analyzing-wrap { text-align: center; padding: 50px 20px; }
  .spinner {
    width: 50px; height: 50px; border: 4px solid #eee;
    border-top-color: var(--amber); border-radius: 50%;
    animation: spin 0.75s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .analyzing-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .analyzing-sub { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

  .thumb-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .thumb-box { flex: 1; position: relative; border-radius: 12px; overflow: hidden; height: 90px; }
  .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.5); color: #fff;
    font-size: 10px; font-weight: 700; text-align: center; padding: 3px; letter-spacing: 0.05em;
  }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detail-cell { background: #f9f8f5; border-radius: 10px; padding: 12px; }
  .detail-cell.full { grid-column: 1 / -1; }
  .dc-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .dc-value { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }

  .ink-badge {
    display: inline-block; background: var(--amber-light); color: #633806;
    padding: 6px 14px; border-radius: 20px; font-size: 15px; font-weight: 700;
    border: 1px solid var(--amber-border); margin-top: 4px;
  }

  .notes-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .notes-text strong { color: var(--text); }

  .error-box {
    background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 12px;
    padding: 14px 16px; color: var(--red-text); font-size: 14px; margin-bottom: 14px; line-height: 1.5;
  }

  .welcome-hero { text-align: center; padding: 30px 0 20px; }
  .welcome-emoji { font-size: 56px; margin-bottom: 14px; }
  .welcome-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .welcome-sub { font-size: 15px; color: var(--text-muted); line-height: 1.6; max-width: 280px; margin: 0 auto; }

  .steps-list { margin: 4px 0; }
  .step-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .step-item:last-child { border-bottom: none; }
  .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--amber-light); color: var(--amber-dark); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 14px; color: var(--text); line-height: 1.5; }
  .step-text strong { color: var(--text); }

  @media (min-width: 500px) {
    body { max-width: 460px; margin: 0 auto; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── File inputs — separate camera vs gallery to fix Android 14 MDM issue ──
const inputCameraFront  = document.createElement('input');
const inputGalleryFront = document.createElement('input');
const inputCameraBack   = document.createElement('input');
const inputGalleryBack  = document.createElement('input');

[inputCameraFront, inputGalleryFront, inputCameraBack, inputGalleryBack].forEach(el => {
  el.type = 'file';
  el.accept = 'image/*';
  document.body.appendChild(el);
});
// Force camera on these:
inputCameraFront.setAttribute('capture', 'environment');
inputCameraBack.setAttribute('capture', 'environment');
// Gallery inputs — no capture attr = Android shows chooser (Files / Gallery / Camera)

inputCameraFront.onchange  = e => handlePhoto(e, 'front');
inputGalleryFront.onchange = e => handlePhoto(e, 'front');
inputCameraBack.onchange   = e => handlePhoto(e, 'back');
inputGalleryBack.onchange  = e => handlePhoto(e, 'back');

// ── API Key stored in localStorage ────────────────────────────────────────
const LS_KEY = 'printer_scanner_api_key';

let state = {
  step: 'welcome',
  apiKey: '',
  front: null,
  back: null,
  details: null,
  error: ''
};

// Load saved key on startup
try { state.apiKey = localStorage.getItem(LS_KEY) || ''; } catch(e) {}

function saveApiKey(key) {
  state.apiKey = key;
  try { localStorage.setItem(LS_KEY, key); } catch(e) {}
}
function clearApiKey() {
  state.apiKey = '';
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}
function hasKey() { return state.apiKey && state.apiKey.length > 20; }

// ── Photo handling ─────────────────────────────────────────────────────────
function toB64(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    const blobUrl = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1280;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(blobUrl);
      res(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.onerror = rej;
    img.src = blobUrl;
  });
}

async function handlePhoto(e, side) {
  const file = e.target.files[0];
  if (!file) return;
  const b64 = await toB64(file);
  const url  = URL.createObjectURL(file);
  if (side === 'front') state.front = { b64, url };
  else                  state.back  = { b64, url };
  e.target.value = '';
  render();
}

// ── AI analysis ───────────────────────────────────────────────────────────
async function analyze() {
  state.step = 'analyzing';
  state.error = '';
  render();

  const prompt = `You are an expert at identifying office printers. Carefully examine BOTH images (front and back of the same printer) and extract every detail visible on the printer and its labels. Return ONLY a raw JSON object — no markdown, no code fences, no explanation whatsoever:
{
  "brand": "e.g. HP, Canon, Brother, Epson, Xerox",
  "model": "full model name e.g. DeskJet 2710e",
  "model_number": "product/part number from label",
  "manufacturer": "company full name",
  "serial_number": "exactly as shown on label, or null if not visible",
  "ink_type": "Ink or Toner",
  "ink_cartridge_numbers": "e.g. HP 305XL, Canon PG-540/CL-541 — be as specific as possible",
  "connectivity": "e.g. USB, WiFi, Bluetooth, Ethernet",
  "printer_type": "e.g. Inkjet All-in-One, Laser, Photo Printer",
  "color_support": "Color or Mono",
  "condition_notes": "visible damage, error lights, paper jams, low ink warnings — or say: No issues visible",
  "additional_notes": "any other details useful for ordering ink, toner or spare parts"
}`;

  // Warn if opened from local file — fetch will be blocked
  if (location.protocol === 'file:') {
    state.error = 'FILE:// ERROR — This app must be opened from a web address (https://...), not from a local file or email attachment. Please ask IT to host it online, then open the link in Chrome.';
    state.step  = 'back';
    render();
    return;
  }

  try {
    let resp;
    try {
      resp = await fetch('/.netlify/functions/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          frontB64: state.front.b64,
          backB64:  state.back.b64,
          apiKey:   state.apiKey
        })
      });
    } catch (networkErr) {
      throw new Error('Cannot reach the server. Check your internet connection. Error: ' + networkErr.message);
    }

    const rawText = await resp.text();

    if (!resp.ok) {
      let msg = rawText;
      try { msg = JSON.parse(rawText).error || rawText; } catch(e) {}
      if (resp.status === 401 || resp.status === 403) throw new Error('Invalid Gemini API key. Get a free key at aistudio.google.com');
      if (resp.status === 429) throw new Error('Rate limit hit. Wait a moment and try again — free tier allows 1,500 requests/day.');
      throw new Error('Error ' + resp.status + ': ' + msg);
    }

    const clean = rawText.replace(/```json|```/g, '').trim();
    state.details = JSON.parse(clean);
    state.step    = 'results';
  } catch (err) {
    state.error = err.message;
    state.step  = 'back';
  }
  render();
}

// ── Quick API key test (no image needed) ──────────────────────────────────
async function testApiKey() {
  const btn = document.getElementById('testBtn');
  if (!btn) return;
  btn.textContent = 'Testing…';
  btn.disabled = true;

  if (location.protocol === 'file:') {
    document.getElementById('testResult').innerHTML =
      '<span style="color:var(--red-text)">❌ Opened as a local file — must be hosted at an https:// URL first.</span>';
    btn.textContent = 'Test API Key';
    btn.disabled = false;
    return;
  }

  try {
    const resp = await fetch('/.netlify/functions/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ frontB64: 'test', backB64: 'test', apiKey: state.apiKey })
    });
    const data = await resp.json();
    if (resp.ok || resp.status === 400) {
      document.getElementById('testResult').innerHTML = '<span style="color:#1a7a40">✅ Connection to server working! Key looks good.</span>';
    } else {
      const msg = data.error || resp.statusText;
      document.getElementById('testResult').innerHTML = '<span style="color:var(--red-text)">❌ ' + resp.status + ': ' + msg + '</span>';
    }
  } catch(e) {
    document.getElementById('testResult').innerHTML = '<span style="color:var(--red-text)">❌ Network error: ' + e.message + '</span>';
  }
  btn.textContent = 'Test API Key';
  btn.disabled = false;
}

// ── WhatsApp share ────────────────────────────────────────────────────────
function sendEmail() {
  const d = state.details;
  const subject = 'Printer Scan Report — ' + d.brand + ' ' + d.model;
  const body = [
    'PRINTER SCAN REPORT',
    '====================',
    '',
    'PRINTER DETAILS',
    'Brand:        ' + d.brand,
    'Model:        ' + d.model,
    'Model No:     ' + (d.model_number || '—'),
    'Manufacturer: ' + d.manufacturer,
    'Serial No:    ' + (d.serial_number || 'Not visible on label'),
    '',
    'SPECS',
    'Type:         ' + d.printer_type,
    'Colour:       ' + d.color_support,
    'Connectivity: ' + d.connectivity,
    '',
    'INK / TONER TO ORDER',
    '====================',
    'Ink Type:     ' + d.ink_type,
    'Cartridge No: ' + d.ink_cartridge_numbers,
    '',
    'NOTES',
    'Condition:    ' + d.condition_notes,
    'Other:        ' + d.additional_notes,
    '',
    '— Sent from Printer Scanner App'
  ].join('\n');
  window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
}

// ── UI helpers ────────────────────────────────────────────────────────────
function topbar(subtitle) {
  return `
  <div class="topbar">
    <span class="topbar-icon">🖨️</span>
    <div>
      <div class="topbar-title">Printer Scanner</div>
      ${subtitle ? '<div class="topbar-sub">' + subtitle + '</div>' : ''}
    </div>
    <div class="topbar-right">
      <button class="key-status ${hasKey() ? 'key-saved' : 'key-missing'}" id="keyBtn">
        ${hasKey() ? '🔑 Key saved' : '⚠️ No key'}
      </button>
    </div>
  </div>`;
}

const STEPS = ['setup','front','back','analyzing','results'];
function progressBar(current) {
  const idx = STEPS.indexOf(current);
  return '<div class="progress-wrap"><div class="progress-steps">' +
    STEPS.map((_,i) => '<div class="ps ' + (i<idx?'done':i===idx?'active':'') + '"></div>').join('') +
    '</div><div class="progress-label">Step ' + (Math.max(idx,0)+1) + ' of ' + STEPS.length + '</div></div>';
}

function photoUI(side, photo) {
  const cam = side === 'front' ? 'inputCameraFront'  : 'inputCameraBack';
  const gal = side === 'front' ? 'inputGalleryFront' : 'inputGalleryBack';
  if (photo) {
    return '<div class="photo-preview-wrap">' +
      '<img src="' + photo.url + '" alt="' + side + '">' +
      '<div class="photo-preview-label">✓ ' + side.toUpperCase() + '</div>' +
      '</div>' +
      '<div class="retake-row">' +
      '<button class="retake-btn" onclick="' + cam + '.click()">📷 Camera</button>' +
      '<button class="retake-btn" onclick="' + gal + '.click()">🖼️ Gallery</button>' +
      '</div>';
  }
  return '<div class="photo-options">' +
    '<div class="photo-option-btn" onclick="' + cam + '.click()"><span class="photo-option-icon">📷</span>Open Camera</div>' +
    '<div class="photo-option-btn" onclick="' + gal + '.click()"><span class="photo-option-icon">🖼️</span>Gallery / Files</div>' +
    '</div>' +
    '<p style="font-size:12px;color:#999;text-align:center;margin-top:4px;">If camera does not open, tap Gallery and choose a photo you already took</p>';
}

// ── Main render ───────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  if (state.step === 'welcome') {
    app.innerHTML =
      topbar(null) +
      '<div class="content">' +
      '<div class="welcome-hero">' +
        '<div class="welcome-emoji">🖨️</div>' +
        '<div class="welcome-title">Printer Scanner</div>' +
        '<div class="welcome-sub">Snap 2 photos. AI reads all the details. Send straight to WhatsApp.</div>' +
      '</div>' +
      (hasKey()
        ? '<div class="key-banner"><span class="key-banner-icon">✅</span><div class="key-banner-text"><strong>API key saved</strong> — ready to scan.</div><button class="key-banner-change" onclick="state.step=\'setup\';render()">Change</button></div>'
        : '<div class="info-box">ℹ️ You need an <strong>OpenAI API key</strong> to use this app. Enter it once — it saves permanently to this tablet.</div>'
      ) +
      '<div class="card"><div class="card-label">How it works</div><div class="steps-list">' +
        '<div class="step-item"><div class="step-num">1</div><div class="step-text"><strong>Enter API key</strong> — saved to this tablet, never asked again</div></div>' +
        '<div class="step-item"><div class="step-num">2</div><div class="step-text"><strong>Photo the front</strong> — brand name &amp; control panel</div></div>' +
        '<div class="step-item"><div class="step-num">3</div><div class="step-text"><strong>Photo the top</strong> — serial number &amp; model sticker</div></div>' +
        '<div class="step-item"><div class="step-num">4</div><div class="step-text"><strong>AI reads everything</strong> — brand, ink code, serial &amp; more</div></div>' +
        '<div class="step-item"><div class="step-num">5</div><div class="step-text"><strong>Send via WhatsApp</strong> — full report, formatted and ready</div></div>' +
      '</div></div>' +
      '<button class="btn btn-primary" id="startBtn">' + (hasKey() ? 'Start Scanning →' : 'Set Up API Key →') + '</button>' +
      '</div>';

    document.getElementById('startBtn').onclick = () => { state.step = hasKey() ? 'front' : 'setup'; render(); };
    document.getElementById('keyBtn').onclick   = () => { state.step = 'setup'; render(); };
    return;
  }

  if (state.step === 'setup') {
    app.innerHTML =
      topbar('API Key Setup') +
      progressBar('setup') +
      '<div class="content">' +
      '<button class="btn-back" id="backBtn">← Back</button>' +
      '<div class="card"><div class="card-label">🔑 Gemini API Key</div>' +
        '<p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;line-height:1.6;">Free key from Google. Enter once — saved permanently to this tablet.</p>' +
        '<label class="field-label">Paste your Gemini API key</label>' +
        '<input type="password" id="keyInput" placeholder="AIza..." value="' + (state.apiKey || '') + '" />' +
        '<p style="font-size:12px;color:#999;margin-top:8px;">Get one free at <strong>aistudio.google.com</strong> → Get API Key</p>' +
        '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">' +
          '<button id="testBtn" style="background:var(--amber-light);border:1px solid var(--amber-border);color:var(--amber-dark);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;width:100%">Test Connection</button>' +
          '<div id="testResult" style="font-size:13px;margin-top:8px;min-height:20px;text-align:center;"></div>' +
        '</div>' +
      '</div>' +
      (hasKey()
        ? '<div class="tip-box">✅ A key is already saved on this tablet. You can replace it above or just continue.<br><br><button id="clearBtn" style="background:none;border:none;color:var(--red-text);font-size:13px;cursor:pointer;text-decoration:underline;padding:0;">Clear saved key</button></div>'
        : ''
      ) +
      '<button class="btn btn-primary" id="saveBtn" ' + (hasKey()?'':'disabled') + '>Save Key &amp; Continue →</button>' +
      '</div>';

    const ki = document.getElementById('keyInput');
    const sb = document.getElementById('saveBtn');
    ki.addEventListener('input', () => { sb.disabled = !ki.value.startsWith('sk-'); });
    ki.addEventListener('input', () => { sb.disabled = !ki.value.startsWith('AIza'); });
    sb.onclick = () => { saveApiKey(ki.value.trim()); state.step = 'front'; render(); };
    document.getElementById('backBtn').onclick = () => { state.step = 'welcome'; render(); };
    const cb = document.getElementById('clearBtn');
    if (cb) cb.onclick = () => { clearApiKey(); render(); };
    document.getElementById('keyBtn').onclick = () => {};
    const tb = document.getElementById('testBtn');
    if (tb) tb.onclick = () => { state.apiKey = ki.value.trim(); testApiKey(); };
    if (ki.value.startsWith('AIza')) sb.disabled = false;
    return;
  }

  if (state.step === 'front') {
    app.innerHTML =
      topbar('Step 2 — Front photo') +
      progressBar('front') +
      '<div class="content">' +
      '<button class="btn-back" id="backBtn">← Back</button>' +
      '<div class="card"><div class="card-label">📸 Front of printer</div>' +
        '<p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;line-height:1.6;">Make sure the <strong>brand name</strong>, <strong>model label</strong> and <strong>control panel</strong> are clearly in frame. This is the <strong>front</strong> of the printer.</p>' +
        photoUI('front', state.front) +
      '</div>' +
      '<button class="btn btn-primary" id="nextBtn" ' + (state.front?'':'disabled') + '>Next — Back Photo →</button>' +
      '</div>';

    document.getElementById('backBtn').onclick = () => { state.step = 'setup'; render(); };
    document.getElementById('nextBtn').onclick = () => { state.step = 'back'; render(); };
    document.getElementById('keyBtn').onclick  = () => { state.step = 'setup'; render(); };
    return;
  }

  if (state.step === 'back') {
    app.innerHTML =
      topbar('Step 3 — Top photo') +
      progressBar('back') +
      '<div class="content">' +
      '<button class="btn-back" id="backBtn">← Back</button>' +
      (state.front
        ? '<div class="saved-photo-row"><img class="saved-thumb" src="' + state.front.url + '" alt="front"><div class="saved-info"><div class="saved-title">✅ Front photo saved</div><button class="saved-retake" id="retakeFront">Retake front photo</button></div></div>'
        : ''
      ) +
      '<div class="card"><div class="card-label">📸 Back of printer</div>' +
        '<p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;line-height:1.6;">Take a photo of the <strong>top</strong> of the printer — this usually shows the model sticker, serial number and any status labels.</p>' +
        photoUI('back', state.back) +
      '</div>' +
      (state.error ? '<div class="error-box">⚠️ <strong>Error:</strong> ' + state.error + '<br><br><small>Check your API key is correct and you have internet access.</small></div>' : '') +
      '<button class="btn btn-primary" id="analyseBtn" ' + (state.back?'':'disabled') + '>🔍 Analyse Printer</button>' +
      '</div>';

    document.getElementById('backBtn').onclick    = () => { state.step = 'front'; render(); };
    document.getElementById('analyseBtn').onclick = () => analyze();
    document.getElementById('keyBtn').onclick     = () => { state.step = 'setup'; render(); };
    const rf = document.getElementById('retakeFront');
    if (rf) rf.onclick = () => { state.step = 'front'; render(); };
    return;
  }

  if (state.step === 'analyzing') {
    app.innerHTML =
      topbar('Analysing…') +
      progressBar('analyzing') +
      '<div class="content"><div class="card"><div class="analyzing-wrap">' +
        '<div class="spinner"></div>' +
        '<div class="analyzing-title">Reading your printer…</div>' +
        '<div class="analyzing-sub">AI is identifying the brand, model, serial number, ink cartridges and condition. This takes 10–20 seconds.</div>' +
      '</div></div></div>';
    return;
  }

  if (state.step === 'results' && state.details) {
    const d = state.details;
    app.innerHTML =
      topbar(d.brand + ' ' + d.model) +
      progressBar('results') +
      '<div class="content">' +
      '<div class="thumb-row">' +
        (state.front ? '<div class="thumb-box"><img src="' + state.front.url + '" alt="front"><div class="thumb-label">FRONT</div></div>' : '') +
        (state.back  ? '<div class="thumb-box"><img src="' + state.back.url  + '" alt="top" ><div class="thumb-label">BACK</div></div>'  : '') +
      '</div>' +
      '<div class="card"><div class="card-label">🖨️ Printer details</div><div class="detail-grid">' +
        '<div class="detail-cell"><div class="dc-label">Brand</div><div class="dc-value">' + d.brand + '</div></div>' +
        '<div class="detail-cell"><div class="dc-label">Type</div><div class="dc-value">' + d.printer_type + '</div></div>' +
        '<div class="detail-cell full"><div class="dc-label">Model</div><div class="dc-value">' + d.model + '</div></div>' +
        '<div class="detail-cell"><div class="dc-label">Model no.</div><div class="dc-value">' + (d.model_number||'—') + '</div></div>' +
        '<div class="detail-cell"><div class="dc-label">Serial no.</div><div class="dc-value">' + (d.serial_number||'Not found') + '</div></div>' +
        '<div class="detail-cell"><div class="dc-label">Colour</div><div class="dc-value">' + d.color_support + '</div></div>' +
        '<div class="detail-cell"><div class="dc-label">Connectivity</div><div class="dc-value">' + d.connectivity + '</div></div>' +
      '</div></div>' +
      '<div class="card"><div class="card-label">🖨️ Ink / toner to order</div>' +
        '<div class="dc-label" style="margin-bottom:6px;">Cartridge number</div>' +
        '<span class="ink-badge">' + d.ink_cartridge_numbers + '</span>' +
        '<div style="margin-top:14px;"><div class="dc-label" style="margin-bottom:4px;">Ink type</div><div class="dc-value">' + d.ink_type + '</div></div>' +
      '</div>' +
      ((d.condition_notes||d.additional_notes)
        ? '<div class="card"><div class="card-label">📋 Notes</div>' +
          (d.condition_notes ? '<p class="notes-text" style="margin-bottom:8px;"><strong>Condition:</strong> ' + d.condition_notes + '</p>' : '') +
          (d.additional_notes ? '<p class="notes-text"><strong>Other:</strong> ' + d.additional_notes + '</p>' : '') +
          '</div>'
        : ''
      ) +
      '<button class="btn btn-email" id="emailBtn">📧 Send as Email</button>' +
      '<button class="btn btn-secondary" id="rescanBtn">Scan another printer</button>' +
      '</div>';

    document.getElementById('emailBtn').onclick  = () => sendEmail();
    document.getElementById('rescanBtn').onclick = () => resetScan();
    document.getElementById('keyBtn').onclick    = () => { state.step = 'setup'; render(); };
    return;
  }
}

function resetScan() {
  state.step    = 'front';
  state.front   = null;
  state.back    = null;
  state.details = null;
  state.error   = '';
  render();
}

render();
</script>
</body>
</html>
